name: Deploy Web App to Vercel (GitHub Integration)

on:
  push:
    branches: ["main"]
    paths:
      - "apps/web/**"
      - "packages/shared/**"
      - "vercel.json"
      - ".vercelignore"
  workflow_dispatch: # Allows manual triggering

# If another push happens while this workflow is still running,
# cancel the earlier run in favor of the next run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Vercel via GitHub Integration
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable --mode=skip-build

      - name: Build shared package
        run: yarn build --filter=@open-swe/shared

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-args: '--prod'
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./

      - name: Deployment status
        if: always()
        run: echo "Vercel GitHub integration deployment completed with status ${{ job.status }}"
